<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Details | DC Universe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="icon.png" type="image/png">
</head>
<body>
    <header>
        <img src="images/logo.png" alt="Logo" class="logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="login.html" id="login-link" class="login-button">Login</a>
            <a href="#" id="logout-link" class="login-button" style="display: none;">Logout</a>
        </nav>
    </header>

    <main>
        <!-- Guidelines: id="place-details", classes place-details + place-info used by CSS -->
        <section id="place-details" class="place-details">
            <h1>Loading Place Details...</h1>
        </section>

        <section id="reviews-list">
            <h2>Reviews from the League</h2>
            <!-- Review cards injected dynamically, each uses class="review-card" -->
        </section>

        <!-- Guidelines: id="add-review", hidden by default, shown only if authenticated -->
        <section id="add-review" style="display: none;">
            <h2>Write a Review</h2>
            <form id="review-form" class="form">
                <label for="review">Your Review:</label>
                <textarea id="review" rows="4" required></textarea>

                <label for="rating">Rating (1-5):</label>
                <input type="number" id="rating" name="rating" min="1" max="5" required>

                <button type="submit" class="details-button">Submit Review</button>
            </form>
        </section>
    </main>

    <footer>
        <p>© 2026 Wayne Enterprises & Justice League. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
