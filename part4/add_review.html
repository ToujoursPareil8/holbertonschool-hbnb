<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Review | DC Universe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="images/logo.png" alt="Logo" class="logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="login.html" id="login-link" class="login-button">Login</a>
            <a href="#" id="logout-link" class="login-button" style="display: none;">Logout</a>
        </nav>
    </header>

    <main>
        <form id="review-form">
            <h2>Leave a Review</h2>

            <label for="review">Your Review:</label>
            <textarea id="review" name="review" rows="5" required></textarea>

            <label for="rating">Rating:</label>
            <select id="rating" name="rating" required>
                <option value="5">5 - Legendary</option>
                <option value="4">4 - Great</option>
                <option value="3">3 - Average</option>
                <option value="2">2 - Poor</option>
                <option value="1">1 - Terrible</option>
            </select>

            <button type="submit" class="details-button">Submit Review</button>
        </form>
    </main>

    <footer>
        <p>© 2026 Wayne Enterprises & Justice League. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
