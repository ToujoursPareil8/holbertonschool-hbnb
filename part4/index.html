<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Hangouts | DC Universe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="icon.png" type="image/png">
</head>
<body>
    <header>
        <img src="images/logo.png" alt="Logo" class="logo">
            <nav>
                <a href="index.html">Home</a>
                <a href="login.html" class="login-button">Login</a>
            </nav>
    </header>

    <main>
        <section id="filter">
            <label for="price-filter">Max Credits per Night:</label>
            <select id="price-filter">
                <option value="100">100 Credits</option>
                <option value="500">500 Credits</option>
            </select>
        </section>

        <section id="places-list">
            <article class="place-card">
                <h3>The Batcave</h3>
                <p>Price: 500 Credits/Night</p>
                <a href="place.html" class="details-button">View Details</a>
            </article>
            
            <article class="place-card">
                <h3>Fortress of Solitude</h3>
                <p>Price: 0 Credits/Night (Kryptonians only)</p>
                <a href="place.html" class="details-button">View Details</a>
            </article>
        </section>
    </main>

    <footer>
        <p>© 2026 Wayne Enterprises & Justice League. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
